<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betclic — Vue d'ensemble 1X2</title>
<link href="https://fonts.googleapis.com/css2?family=Marianne:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue-france: #000091;
  --red-marianne: #c9191e;
  --text-main: #161616;
  --text-mention: #666666;
  --bg-default: #ffffff;
  --bg-alt: #f6f6f6;
  --border-default: #e5e5e5;
  --success: #1f8d49;
  --warning: #d64d00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-default); color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 14px; line-height: 1.5;
  min-height: 100vh; display: flex; flex-direction: column;
}
.gov-header {
  border-bottom: 2px solid var(--blue-france);
  background: var(--bg-default); padding: 12px 24px; flex-shrink: 0;
}
.gov-brand-container { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
.marianne-logo {
  border-left: 3px solid var(--text-main); padding-left: 8px;
  font-weight: 700; text-transform: uppercase; font-size: 11px;
  letter-spacing: 0.05em; line-height: 1.1;
}
.marianne-logo span { color: var(--red-marianne); }
.app-title-area { flex: 1; padding-left: 16px; }
.app-title-area h1 { font-size: 16px; font-weight: 700; color: var(--blue-france); }
.app-title-area p { font-size: 11px; color: var(--text-mention); }
.api-config {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-alt); padding: 6px 10px; border: 1px solid var(--border-default); flex-wrap: wrap;
}
.gov-input {
  background: var(--bg-default); color: var(--text-main); border: 1px solid #858585;
  padding: 5px 10px; font-family: 'Roboto Mono', monospace; font-size: 12px; outline: none;
}
.gov-input:focus { outline: 2px solid var(--blue-france); }
.gov-btn {
  background: var(--blue-france); color: #fff; border: none; padding: 5px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Marianne', Arial, sans-serif;
}
.gov-btn:hover { background: #1b1bbf; }
.gov-tabs {
  background: var(--bg-alt); display: flex;
  border-bottom: 1px solid var(--border-default); padding: 0 24px; flex-shrink: 0;
}
.tab-btn {
  background: transparent; border: none; color: var(--text-main);
  padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; text-decoration: none; display: inline-block;
  font-family: 'Marianne', Arial, sans-serif;
}
.tab-btn:hover { background: rgba(0,0,145,0.05); }
.tab-btn.active { border-bottom-color: var(--blue-france); color: var(--blue-france); }
.status-bar {
  background: #eeeeee; padding: 6px 24px; font-size: 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-default); flex-shrink: 0;
}
#dot { width: 8px; height: 8px; border-radius: 50%; background: #858585; flex-shrink: 0; }
#dot.live { background: var(--success); }
#dot.err  { background: var(--red-marianne); }
.toolbar {
  display: flex; gap: 8px; align-items: center; padding: 10px 24px;
  background: var(--bg-alt); border-bottom: 1px solid var(--border-default);
  flex-wrap: wrap; flex-shrink: 0;
}
#search {
  background: var(--bg-default); border: 1px solid #858585; color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 12px; padding: 5px 10px;
  outline: none; width: 220px;
}
#search:focus { outline: 2px solid var(--blue-france); }
.pill {
  background: var(--bg-default); border: 1px solid #858585; color: var(--text-main);
  font-family: 'Marianne', Arial, sans-serif; font-size: 11px; padding: 4px 12px;
  cursor: pointer; font-weight: 700;
}
.pill:hover { border-color: var(--blue-france); }
.pill.active { background: var(--blue-france); color: #fff; border-color: var(--blue-france); }
#count-label { color: var(--text-mention); font-size: 12px; margin-left: auto; }

/* grid */
#grid {
  flex: 1; padding: 16px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 10px;
  align-content: start;
}

/* cards */
.card {
  background: var(--bg-default); border: 1px solid var(--border-default);
  overflow: hidden;
}
.card:hover { border-color: var(--blue-france); }

.card-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border-default);
}
.card-match {
  color: var(--text-main); font-size: 12px; font-weight: 700;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  text-decoration: none; cursor: pointer;
}
.card-match:hover { color: var(--blue-france); text-decoration: underline; text-underline-offset: 2px; }
.card-comp {
  color: var(--text-mention); font-size: 9px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 110px;
}

.live-badge {
  background: var(--success); color: #fff; font-size: 8px; font-weight: 700;
  padding: 1px 5px; flex-shrink: 0;
}
.card-date { color: var(--text-mention); font-size: 9px; white-space: nowrap; }

/* odds */
.odds-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 1px; padding: 6px;
  background: var(--border-default);
}
.odds-cell {
  background: var(--bg-alt); padding: 6px 4px; text-align: center;
  display: flex; flex-direction: column; gap: 2px; position: relative;
  overflow: hidden;
}
.sel-label {
  color: var(--text-mention); font-size: 9px; text-transform: uppercase;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sel-odd {
  color: var(--text-main); font-size: 16px; font-weight: 700; letter-spacing: .02em;
  font-family: 'Roboto Mono', monospace;
}
.sel-odd.no-data { color: var(--text-mention); font-size: 13px; }

/* flash */
.flash-up, .flash-down {
  position: absolute; inset: 0; pointer-events: none; opacity: 0;
}
.flash-up   { background: rgba(31,141,73,.18); }
.flash-down { background: rgba(201,25,30,.18); }
@keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }
.flashing-up   .flash-up   { animation: flash-anim .6s ease-out forwards; }
.flashing-down .flash-down { animation: flash-anim .6s ease-out forwards; }

.trend { font-size: 9px; display: inline-block; margin-left: 2px; font-weight: 700; }
.trend.up   { color: var(--success); }
.trend.down { color: var(--red-marianne); }

.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 12px; border-top: 1px solid var(--border-default);
}
.card-mid  { color: var(--text-mention); font-size: 9px; font-family: 'Roboto Mono', monospace; }
.card-age  { color: var(--text-mention); font-size: 9px; }

.score-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px; border-top: 1px solid var(--border-default);
  font-size: 10px; min-height: 22px;
}
.score-val  { color: var(--success); font-weight: 700; font-size: 13px; letter-spacing: .05em; font-family: 'Roboto Mono', monospace; }
.period-val { color: var(--blue-france); font-size: 9px; }
.minute-val { color: var(--text-mention); font-size: 9px; }

#empty {
  grid-column: 1/-1; text-align: center; padding: 80px 0;
  color: var(--text-mention); font-size: 13px; display: none;
}

/* stats */
#stats { display: flex; gap: 16px; white-space: nowrap; font-size: 12px; color: var(--text-mention); }
#stats b { color: var(--blue-france); font-family: 'Roboto Mono', monospace; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 3px; }
</style>
</head>
<body>

<header class="gov-header">
  <div class="gov-brand-container">
    <div class="marianne-logo">République<br>Française<br><span>——</span></div>
    <div class="app-title-area">
      <h1>Betclic — Vue d'ensemble 1X2</h1>
      <p>Suivi des cotes en temps réel</p>
    </div>
    <div class="api-config">
      <label style="font-size:12px;font-weight:700;white-space:nowrap;">Serveur :</label>
      <input class="gov-input" id="api-url" value="http://localhost:5001" placeholder="URL du serveur" style="flex:1;min-width:200px">
      <button class="gov-btn" onclick="reconnect()">Connecter</button>
      <div id="stats">
        <span>Matchs : <b id="st-matches">0</b></span>
        <span>Màj : <b id="st-updates">0</b></span>
        <span>Flux : <b id="st-streams">0</b></span>
      </div>
    </div>
  </div>
</header>

<nav class="gov-tabs">
  <a class="tab-btn active" href="dashboard.html">Vue d'ensemble</a>
  <a class="tab-btn" href="chart.html">Graphique</a>
  <a class="tab-btn" href="stream.html">Journal SSE</a>
</nav>

<div class="status-bar">
  <span id="dot"></span>
  <span id="conn-label">—</span>
</div>

<div class="toolbar">
  <input id="search" placeholder="Rechercher match ou compétition…" oninput="applyFilters()">
  <button class="pill active" data-filter="all"      onclick="setFilter(this)">Tous</button>
  <button class="pill"        data-filter="live"     onclick="setFilter(this)">Direct</button>
  <button class="pill"        data-filter="prematch" onclick="setFilter(this)">Avant-match</button>
  <span id="count-label">0 matchs</span>
</div>

<div id="grid">
  <div id="empty">En attente de données…</div>
</div>

<script>
const matchState = {};
let activeFilter = 'all';
let es = null;
let updateCount = 0;

function getBase() { return document.getElementById('api-url').value.replace(/\/$/,''); }

async function reconnect() {
  if (es) { es.close(); es = null; }
  setStatus('connecting');

  try {
    const [marketsRes, pricesRes] = await Promise.all([
      fetch(getBase() + '/markets'),
      fetch(getBase() + '/prices'),
    ]);
    const markets = await marketsRes.json();
    const prices  = await pricesRes.json();

    for (const [mid, meta] of Object.entries(markets)) {
      _ensureMatchState(mid, meta);
      const mktOdds = (prices[mid] || {})['1X2'];
      if (mktOdds) Object.assign(matchState[mid].odds, mktOdds);
      _ensureCard(mid);
      updateCard(mid);
    }
    for (const [mid, mktMap] of Object.entries(prices)) {
      if (matchState[mid] && matchState[mid].cardEl) continue;
      _ensureMatchState(mid, {});
      const mktOdds = mktMap['1X2'];
      if (mktOdds) Object.assign(matchState[mid].odds, mktOdds);
      _ensureCard(mid);
      updateCard(mid);
    }
    applyFilters();
  } catch (err) {
    console.warn('[betclic] bootstrap failed:', err);
  }

  es = new EventSource(getBase() + '/stream');
  es.onopen  = () => { setStatus('live'); startStatsPoll(); };
  es.onerror = () => { setStatus('err'); setTimeout(reconnect, 4000); };
  es.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'price')    handlePrice(msg);
    if (msg.type === 'snapshot') handleSnapshot(msg);
  };
}

function _ensureMatchState(mid, meta) {
  if (!matchState[mid]) {
    matchState[mid] = { meta: {}, odds: {}, prevOdds: {}, lastTs: Date.now() };
  }
  Object.assign(matchState[mid].meta, meta);
}

function _ensureCard(mid) {
  if (!matchState[mid].cardEl) {
    matchState[mid].cardEl = createCard(mid);
    document.getElementById('grid').appendChild(matchState[mid].cardEl);
    document.getElementById('empty').style.display = 'none';
  }
}

function handlePrice(msg) {
  if (msg.market !== '1X2') return;
  const mid = String(msg.match_id);
  updateCount++;
  document.getElementById('st-updates').textContent = updateCount;

  _ensureMatchState(mid, msg.meta || {});
  const ms  = matchState[mid];
  ms.lastTs = Date.now();
  Object.assign(ms.prevOdds, ms.odds);
  Object.assign(ms.odds, msg.odds);

  if (msg.live  !== undefined) ms.meta.live   = msg.live;
  if (msg.score !== undefined) ms.meta.score  = msg.score;
  if (msg.period !== undefined && msg.period) ms.meta.period = msg.period;
  if (msg.minute !== undefined && msg.minute) ms.meta.minute = msg.minute;

  _ensureCard(mid);
  updateCard(mid);
  applyFilters();
}

function handleSnapshot(msg) {
  const prices = msg.prices || {};
  for (const [mid, markets] of Object.entries(prices)) {
    _ensureMatchState(mid, {});
    const ms = matchState[mid];
    const mktOdds = markets['1X2'];
    if (mktOdds) Object.assign(ms.odds, mktOdds);
    _ensureCard(mid);
    updateCard(mid);
  }
  applyFilters();
}

function createCard(mid) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.mid = mid;
  div.innerHTML = `
    <div class="card-header">
      <a class="card-match" id="cm-${mid}" href="chart.html?match_id=${mid}">—</a>
      <div class="card-comp"  id="cc-${mid}"></div>
      <div class="card-date"  id="cd-${mid}"></div>
    </div>
    <div class="odds-row">
      ${makeCell(mid,'1')}
      ${makeCell(mid,'Nul')}
      ${makeCell(mid,'2')}
    </div>
    <div class="score-bar" id="sb-${mid}" style="display:none">
      <span class="score-val"  id="sc-${mid}"></span>
      <span class="period-val" id="pd-${mid}"></span>
      <span class="minute-val" id="mn-${mid}"></span>
    </div>
    <div class="card-footer">
      <span class="card-mid" id="cmid-${mid}">${mid}</span>
      <span class="card-age" id="cage-${mid}">—</span>
    </div>`;
  return div;
}

function makeCell(mid, selKey) {
  const id = cellId(mid, selKey);
  return `
    <div class="odds-cell" id="${id}">
      <div class="sel-label">${selKey}</div>
      <div class="sel-odd no-data" id="odd-${id}">—</div>
      <div class="flash-up"></div>
      <div class="flash-down"></div>
    </div>`;
}

function cellId(mid, sel) {
  return 'cell_' + mid + '_' + sel.replace(/[^a-zA-Z0-9]/g,'_');
}

const LABELS = {
  '1': 'Domicile', 'Nul': 'Nul', '2': 'Extérieur',
  'X': 'Nul',
};

function updateCard(mid) {
  const ms   = matchState[mid];
  const meta = ms.meta;

  const matchEl = document.getElementById('cm-' + mid);
  const compEl  = document.getElementById('cc-' + mid);
  const dateEl  = document.getElementById('cd-' + mid);
  const ageEl   = document.getElementById('cage-' + mid);

  if (matchEl && meta.match) matchEl.textContent = meta.match;
  if (compEl)  compEl.textContent  = meta.competition || '';
  if (dateEl)  dateEl.textContent  = formatDate(meta.date);
  if (ageEl)   ageEl.textContent   = timeAgo(ms.lastTs);

  const header = ms.cardEl.querySelector('.card-header');
  let liveBadge = ms.cardEl.querySelector('.live-badge');
  if (meta.live && !liveBadge) {
    liveBadge = document.createElement('span');
    liveBadge.className = 'live-badge';
    liveBadge.textContent = 'DIRECT';
    header.insertBefore(liveBadge, header.firstChild);
  } else if (!meta.live && liveBadge) {
    liveBadge.remove();
  }

  const teams = meta.teams || [];
  const oddKeys = Object.keys(ms.odds);
  const slots = resolveSlots(oddKeys, teams);

  for (const [slotKey, selName] of Object.entries(slots)) {
    const odd     = ms.odds[selName];
    const prevOdd = ms.prevOdds[selName];
    const cid     = cellId(mid, slotKey);
    const cell    = document.getElementById(cid);
    if (!cell) continue;

    cell.querySelector('.sel-label').textContent = LABELS[slotKey] || slotKey;

    const oddEl = document.getElementById('odd-' + cid);
    if (odd !== undefined) {
      oddEl.textContent = odd.toFixed(2);
      oddEl.classList.remove('no-data');

      let trendHtml = '';
      if (prevOdd !== undefined && prevOdd !== odd) {
        const dir = odd > prevOdd ? 'up' : 'down';
        trendHtml = `<span class="trend ${dir}">${dir==='up' ? '▲' : '▼'}</span>`;
        flashCell(cell, dir);
      }
      oddEl.innerHTML = odd.toFixed(2) + trendHtml;
    }
  }

  ms.cardEl.dataset.live = meta.live ? '1' : '0';
  ms.cardEl.dataset.matchname = (meta.match || '').toLowerCase();
  ms.cardEl.dataset.comp      = (meta.competition || '').toLowerCase();

  const sb = document.getElementById('sb-' + mid);
  if (sb) {
    const hasScore = meta.score !== undefined && meta.score !== null;
    sb.style.display = (meta.live && hasScore) ? 'flex' : 'none';
    if (hasScore) {
      const sc = document.getElementById('sc-' + mid);
      const pd = document.getElementById('pd-' + mid);
      const mn = document.getElementById('mn-' + mid);
      if (sc) sc.textContent = meta.score || '';
      if (pd) pd.textContent = meta.period ? `[${meta.period}]` : '';
      if (mn) mn.textContent = meta.minute ? `${meta.minute}'` : '';
    }
  }
}

function resolveSlots(oddKeys, teams) {
  if (oddKeys.includes('1') || oddKeys.includes('X') || oddKeys.includes('2')) {
    return { '1': '1', 'Nul': oddKeys.includes('Nul') ? 'Nul' : 'X', '2': '2' };
  }
  const sorted = [...oddKeys];
  if (sorted.length === 2) return { '1': sorted[0], 'Nul': '', '2': sorted[1] };
  if (sorted.length === 3) return { '1': sorted[0], 'Nul': sorted[1], '2': sorted[2] };
  return {};
}

function flashCell(cell, dir) {
  cell.classList.remove('flashing-up', 'flashing-down');
  void cell.offsetWidth;
  cell.classList.add(dir === 'up' ? 'flashing-up' : 'flashing-down');
  setTimeout(() => cell.classList.remove('flashing-up','flashing-down'), 700);
}

function setFilter(el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  applyFilters();
}

function applyFilters() {
  const q    = document.getElementById('search').value.toLowerCase().trim();
  let   vis  = 0;
  for (const ms of Object.values(matchState)) {
    if (!ms.cardEl) continue;
    const card = ms.cardEl;
    const live = card.dataset.live === '1';

    let show = true;
    if (activeFilter === 'live'     && !live)  show = false;
    if (activeFilter === 'prematch' &&  live)  show = false;
    if (q) {
      const nm = card.dataset.matchname || '';
      const cp = card.dataset.comp      || '';
      if (!nm.includes(q) && !cp.includes(q)) show = false;
    }
    card.style.display = show ? '' : 'none';
    if (show) vis++;
  }
  document.getElementById('count-label').textContent = `${vis} match${vis!==1?'s':''}`;
  document.getElementById('empty').style.display =
    vis === 0 && Object.keys(matchState).length > 0 ? 'block' : 'none';
}

let _statsPollId = null;
function startStatsPoll() {
  if (_statsPollId) return;
  _statsPollId = setInterval(async () => {
    try {
      const r = await fetch(getBase() + '/status');
      const d = await r.json();
      document.getElementById('st-matches').textContent = d.matches  || 0;
      document.getElementById('st-streams').textContent = d.streams  || 0;
    } catch {}
  }, 5000);
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5)  return 'à l\'instant';
  if (s < 60) return s + 's';
  return Math.floor(s/60) + 'min';
}

setInterval(() => {
  for (const [mid, ms] of Object.entries(matchState)) {
    const el = document.getElementById('cage-' + mid);
    if (el) el.textContent = timeAgo(ms.lastTs);
  }
}, 10000);

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'}) + ' ' +
           d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}

function setStatus(s) {
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('conn-label');
  if (s === 'live')     { dot.className = 'live'; lbl.textContent = 'Connecté'; }
  else if (s === 'err') { dot.className = 'err';  lbl.textContent = 'Erreur — reconnexion…'; }
  else                  { dot.className = '';     lbl.textContent = 'connexion…'; }
}

reconnect();
</script>
</body>
</html>
