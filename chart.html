<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Betclic — Price Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
/* ── BASE ─────────────────────────────────────────────────── */
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:      #060a0f;
  --bg2:     #0c1420;
  --bg3:     #111d2e;
  --border:  #1a2e45;
  --accent:  #ffb300;
  --blue:    #0096ff;
  --text:    #8ab4d4;
  --text-hi: #cde4f7;
  --green:   #00e676;
  --red:     #ff4f4f;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Fira Mono','Cascadia Code','Consolas',monospace;
  font-size:12px; height:100vh; display:flex; flex-direction:column;
  overflow:hidden;
}

/* ── TOP BAR ──────────────────────────────────────────────── */
#topbar {
  display:flex; align-items:center; gap:10px; padding:8px 14px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; flex-wrap:wrap;
}
.logo { color:var(--accent); font-weight:700; font-size:13px; letter-spacing:.06em; }
.logo span { color:var(--text); font-weight:400; font-size:11px; }
#dot { width:8px; height:8px; border-radius:50%; background:#2a4060; flex-shrink:0; }
#dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
#dot.err  { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.ctrl {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:11px; padding:4px 8px; outline:none; cursor:pointer;
}
.ctrl:focus, .ctrl:hover { border-color:var(--accent); }
#topbar input.ctrl { width:190px; }

/* ── MAIN LAYOUT ──────────────────────────────────────────── */
#main {
  flex:1; display:flex; overflow:hidden;
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
#sidebar {
  width:260px; flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-head {
  padding:8px 10px; border-bottom:1px solid var(--border);
  color:var(--text); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
}
#match-search {
  background:var(--bg3); border:0; border-bottom:1px solid var(--border);
  color:var(--text-hi); font-family:inherit; font-size:11px;
  padding:7px 10px; outline:none; width:100%;
}
#match-search:focus { border-bottom-color:var(--accent); }

#match-list {
  flex:1; overflow-y:auto;
}
.match-item {
  padding:6px 10px; cursor:pointer; border-bottom:1px solid rgba(26,46,69,.3);
  display:flex; flex-direction:column; gap:2px;
}
.match-item:hover  { background:rgba(255,179,0,.04); }
.match-item.active { background:rgba(255,179,0,.08); border-left:2px solid var(--accent); }
.mi-name  { color:var(--text-hi); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mi-comp  { color:#3a6080; font-size:9px; }
.mi-live  { display:inline-block; background:var(--green); color:#000; font-size:7px;
            font-weight:700; padding:1px 4px; margin-right:4px; vertical-align:middle; }

/* ── RIGHT PANEL ──────────────────────────────────────────── */
#right {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
}

/* Selection pills */
#sel-bar {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-wrap:wrap; flex-shrink:0;
}
#sel-bar-label { color:#3a6080; font-size:10px; margin-right:4px; }
.sel-pill {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:inherit; font-size:10px; padding:3px 10px; cursor:pointer;
}
.sel-pill:hover  { border-color:var(--accent); color:var(--text-hi); }
.sel-pill.active { border-color:var(--accent); color:var(--accent); background:rgba(255,179,0,.06); }

/* Chart info bar */
#chart-info {
  display:flex; gap:16px; align-items:center; padding:6px 14px;
  background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
}
.ci-label { color:#3a6080; font-size:10px; }
.ci-val   { color:var(--text-hi); font-size:12px; font-weight:600; }
.ci-val.up   { color:var(--green); }
.ci-val.down { color:var(--red); }
#ci-live-badge { background:var(--green); color:#000; font-size:8px; font-weight:700; padding:1px 5px; display:none; }
#ci-count { margin-left:auto; color:#3a6080; font-size:10px; }

/* Chart area */
#chart-wrap {
  flex:1; position:relative; padding:14px;
  overflow:hidden;
}
canvas#chart { display:block; width:100% !important; height:100% !important; }

/* No-selection overlay */
#no-sel {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:#2a4060; font-size:13px; pointer-events:none;
}
#no-sel .hint { font-size:10px; color:#1a2e45; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#2a4060; border-radius:2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">BETCLIC <span>/ Price Chart</span></div>
  <span id="dot"></span>
  <input id="api-url" class="ctrl" value="http://localhost:5003">
  <button class="ctrl" onclick="reconnect()">↺ Connect</button>
  <select id="sel-market" class="ctrl" onchange="onMarketChange()">
    <option value="1X2">1X2</option>
    <option value="O/U">O/U</option>
  </select>
  <select id="sel-window" class="ctrl" onchange="redrawChart()">
    <option value="300">5 min</option>
    <option value="900">15 min</option>
    <option value="3600" selected>1 hour</option>
    <option value="86400">24 hours</option>
    <option value="0">All</option>
  </select>
  <button class="ctrl" onclick="clearHistory()">✕ Clear history</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-head">Active matches</div>
    <input id="match-search" placeholder="Filter matches…" oninput="filterMatches()">
    <div id="match-list"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right">

    <!-- Selection pills -->
    <div id="sel-bar">
      <span id="sel-bar-label">Selection:</span>
      <span style="color:#2a4060;font-size:10px">← pick a match</span>
    </div>

    <!-- Chart info -->
    <div id="chart-info">
      <div><span class="ci-label">Current </span><span class="ci-val" id="ci-cur">—</span></div>
      <div><span class="ci-label">Min </span><span class="ci-val" id="ci-min">—</span></div>
      <div><span class="ci-label">Max </span><span class="ci-val" id="ci-max">—</span></div>
      <div><span class="ci-label">Δ </span><span class="ci-val" id="ci-delta">—</span></div>
      <span id="ci-live-badge">LIVE</span>
      <span id="ci-count">0 points</span>
    </div>

    <!-- Chart -->
    <div id="chart-wrap">
      <canvas id="chart"></canvas>
      <div id="no-sel">
        <div>Select a match and a selection</div>
        <div class="hint">Price history will appear here</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
const matchState = {};    // matchState[mid] = { meta, odds:{sel:val} }
// history[mid][market][sel] = [{ts, odd}, ...]
const history    = {};

let selectedMid = null;
let selectedSel = null;
let es          = null;

// ── CONNECTION ────────────────────────────────────────────────────────────────
function getBase() { return document.getElementById('api-url').value.replace(/\/$/,''); }

function reconnect() {
  if (es) { es.close(); es = null; }
  setStatus('connecting');
  es = new EventSource(getBase() + '/stream');
  es.onopen  = () => setStatus('live');
  es.onerror = () => { setStatus('err'); setTimeout(reconnect, 4000); };
  es.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'price')    handlePrice(msg);
    if (msg.type === 'snapshot') handleSnapshot(msg);
  };
}

// ── HANDLE EVENTS ─────────────────────────────────────────────────────────────
function handlePrice(msg) {
  const mid     = String(msg.match_id);
  const market  = msg.market;
  const odds    = msg.odds || {};
  const meta    = msg.meta || {};
  const ts      = msg.ts || Date.now() / 1000;

  // Update state
  if (!matchState[mid]) matchState[mid] = { meta: {}, odds: {} };
  Object.assign(matchState[mid].meta, meta);
  Object.assign(matchState[mid].odds, odds);

  // Record history
  history[mid] = history[mid] || {};
  history[mid][market] = history[mid][market] || {};
  for (const [sel, odd] of Object.entries(odds)) {
    history[mid][market][sel] = history[mid][market][sel] || [];
    history[mid][market][sel].push({ ts: ts * 1000, odd });  // store in ms
    // Keep at most 2000 points per series
    if (history[mid][market][sel].length > 2000) {
      history[mid][market][sel].splice(0, 1);
    }
  }

  // Update sidebar
  renderSidebarItem(mid);

  // If this is the active match+market, refresh chart & pills
  if (mid === selectedMid && market === getMarket()) {
    renderSelPills();
    if (selectedSel && odds[selectedSel] !== undefined) {
      appendChartPoint(ts * 1000, odds[selectedSel]);
    }
  }
}

function handleSnapshot(msg) {
  const prices = msg.prices || {};
  for (const [mid, markets] of Object.entries(prices)) {
    if (!matchState[mid]) matchState[mid] = { meta: {}, odds: {} };
    for (const [mkt, odds] of Object.entries(markets)) {
      Object.assign(matchState[mid].odds, odds);
      history[mid] = history[mid] || {};
      history[mid][mkt] = history[mid][mkt] || {};
      // Seed history with one point at snapshot time
      const nowMs = Date.now();
      for (const [sel, odd] of Object.entries(odds)) {
        history[mid][mkt][sel] = history[mid][mkt][sel] || [];
        const arr = history[mid][mkt][sel];
        if (arr.length === 0) arr.push({ ts: nowMs, odd });
      }
    }
    renderSidebarItem(mid);
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebarItem(mid) {
  const ms   = matchState[mid];
  const meta = ms.meta;
  let item = document.getElementById('mi-' + mid);
  if (!item) {
    item = document.createElement('div');
    item.className = 'match-item';
    item.id = 'mi-' + mid;
    item.dataset.mid = mid;
    item.onclick = () => selectMatch(mid);
    document.getElementById('match-list').appendChild(item);
  }
  const liveHtml = meta.live ? '<span class="mi-live">LIVE</span>' : '';
  item.dataset.name = (meta.match || '').toLowerCase();
  item.dataset.comp = (meta.competition || '').toLowerCase();
  item.innerHTML = `
    <div class="mi-name">${liveHtml}${esc(meta.match || mid)}</div>
    <div class="mi-comp">${esc(meta.competition || '')}</div>`;
  filterMatches();
}

function filterMatches() {
  const q = document.getElementById('match-search').value.toLowerCase().trim();
  document.querySelectorAll('.match-item').forEach(el => {
    const nm = el.dataset.name || '';
    const cp = el.dataset.comp || '';
    el.style.display = (!q || nm.includes(q) || cp.includes(q)) ? '' : 'none';
  });
}

// ── MATCH SELECTION ────────────────────────────────────────────────────────────
function selectMatch(mid) {
  selectedMid = mid;
  selectedSel = null;

  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('mi-' + mid);
  if (item) item.classList.add('active');

  // Update live badge in info bar
  const ms = matchState[mid] || {};
  document.getElementById('ci-live-badge').style.display =
    ms.meta && ms.meta.live ? 'inline-block' : 'none';

  renderSelPills();
  resetChart();
  document.getElementById('no-sel').style.display = 'flex';
}

function getMarket() { return document.getElementById('sel-market').value; }
function onMarketChange() { if (selectedMid) { renderSelPills(); resetChart(); } }

// ── SELECTION PILLS ───────────────────────────────────────────────────────────
function renderSelPills() {
  if (!selectedMid) return;
  const market = getMarket();
  const h = (history[selectedMid] || {})[market] || {};
  const sels = Object.keys(h);
  const bar = document.getElementById('sel-bar');
  bar.innerHTML = '<span id="sel-bar-label">Selection:</span>';

  if (sels.length === 0) {
    bar.innerHTML += '<span style="color:#2a4060;font-size:10px">No data for this market</span>';
    return;
  }
  for (const sel of sels) {
    const btn = document.createElement('button');
    btn.className = 'sel-pill' + (sel === selectedSel ? ' active' : '');
    btn.textContent = sel;
    btn.onclick = () => selectSel(sel);
    bar.appendChild(btn);
  }
}

function selectSel(sel) {
  selectedSel = sel;
  document.querySelectorAll('.sel-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === sel);
  });
  loadChartFromHistory();
  document.getElementById('no-sel').style.display = 'none';
}

// ── CHART ─────────────────────────────────────────────────────────────────────
let chartObj = null;

function initChart() {
  if (chartObj) { chartObj.destroy(); chartObj = null; }
  const ctx = document.getElementById('chart').getContext('2d');
  chartObj = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label:           '',
        data:            [],
        borderColor:     '#ffb300',
        backgroundColor: 'rgba(255,179,0,.06)',
        borderWidth:     1.5,
        pointRadius:     0,
        pointHoverRadius:4,
        tension:         0,
        fill:            true,
      }]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      animation:           false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0c1420',
          borderColor:     '#1a2e45',
          borderWidth:     1,
          titleColor:      '#8ab4d4',
          bodyColor:       '#ffb300',
          callbacks: {
            title: (items) => new Date(items[0].parsed.x).toLocaleTimeString('fr-FR', {hour12:false}),
            label: (item)  => ' ' + item.parsed.y.toFixed(3),
          }
        }
      },
      scales: {
        x: {
          type:   'time',
          time:   { unit: 'minute', displayFormats: { minute: 'HH:mm', second: 'HH:mm:ss' } },
          grid:   { color: 'rgba(26,46,69,.4)' },
          ticks:  { color: '#2a6080', font: { family: 'Fira Mono', size: 10 }, maxTicksLimit: 10 },
        },
        y: {
          grid:   { color: 'rgba(26,46,69,.4)' },
          ticks:  {
            color: '#2a6080', font: { family: 'Fira Mono', size: 10 },
            callback: (v) => v.toFixed(2),
          },
          position: 'right',
        }
      }
    }
  });
}

function resetChart() {
  initChart();
  updateInfoBar([]);
}

function loadChartFromHistory() {
  if (!selectedMid || !selectedSel) return;
  const market = getMarket();
  const arr    = ((history[selectedMid] || {})[market] || {})[selectedSel] || [];
  const win    = parseInt(document.getElementById('sel-window').value) * 1000;
  const cutoff = win > 0 ? Date.now() - win : 0;
  const pts    = arr.filter(p => p.ts >= cutoff).map(p => ({ x: p.ts, y: p.odd }));

  initChart();
  chartObj.data.datasets[0].label = selectedSel;
  chartObj.data.datasets[0].data  = pts;
  chartObj.update('none');
  updateInfoBar(pts);
}

function appendChartPoint(tsMs, odd) {
  if (!chartObj) return;
  const win    = parseInt(document.getElementById('sel-window').value) * 1000;
  const cutoff = win > 0 ? Date.now() - win : 0;

  chartObj.data.datasets[0].data.push({ x: tsMs, y: odd });
  // Trim old points outside window
  if (win > 0) {
    chartObj.data.datasets[0].data =
      chartObj.data.datasets[0].data.filter(p => p.x >= cutoff);
  }
  chartObj.update('none');

  // Update info bar
  const pts = chartObj.data.datasets[0].data;
  updateInfoBar(pts);
}

function updateInfoBar(pts) {
  if (!pts || pts.length === 0) {
    ['ci-cur','ci-min','ci-max','ci-delta'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '—'; el.className = 'ci-val';
    });
    document.getElementById('ci-count').textContent = '0 points';
    return;
  }
  const odds   = pts.map(p => p.y);
  const cur    = odds[odds.length - 1];
  const first  = odds[0];
  const mn     = Math.min(...odds);
  const mx     = Math.max(...odds);
  const delta  = cur - first;

  const curEl   = document.getElementById('ci-cur');
  const deltaEl = document.getElementById('ci-delta');

  curEl.textContent   = cur.toFixed(3);
  curEl.className     = 'ci-val';
  document.getElementById('ci-min').textContent = mn.toFixed(3);
  document.getElementById('ci-max').textContent = mx.toFixed(3);
  deltaEl.textContent = (delta >= 0 ? '+' : '') + delta.toFixed(3);
  deltaEl.className   = 'ci-val ' + (delta > 0 ? 'up' : delta < 0 ? 'down' : '');
  document.getElementById('ci-count').textContent = pts.length + ' pts';
}

function redrawChart() { if (selectedSel) loadChartFromHistory(); }

function clearHistory() {
  if (!selectedMid || !selectedSel) return;
  const market = getMarket();
  if ((history[selectedMid] || {})[market]) {
    history[selectedMid][market][selectedSel] = [];
  }
  resetChart();
}

// ── ALSO fetch SQLite history on selection ────────────────────────────────────
async function fetchDbHistory(mid, sel, market) {
  try {
    const url = `${getBase()}/history?match_id=${encodeURIComponent(mid)}&selection=${encodeURIComponent(sel)}&market=${encodeURIComponent(market)}&limit=1000`;
    const r = await fetch(url);
    const rows = await r.json();
    if (!rows.length) return;

    // Merge into history
    history[mid] = history[mid] || {};
    history[mid][market] = history[mid][market] || {};
    history[mid][market][sel] = history[mid][market][sel] || [];

    // Prepend DB rows that are older than earliest in-memory point
    const inMem  = history[mid][market][sel];
    const cutoff = inMem.length ? inMem[0].ts : Infinity;
    const dbPts  = rows
      .map(r => ({ ts: r.ts * 1000, odd: r.odd }))
      .filter(p => p.ts < cutoff);

    history[mid][market][sel] = [...dbPts, ...inMem];
  } catch { /* silently ignore if backend not ready */ }
}

// Override selectSel to also pull DB history
const _origSelectSel = selectSel;
async function selectSelWithHistory(sel) {
  selectedSel = sel;
  document.querySelectorAll('.sel-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === sel);
  });
  document.getElementById('no-sel').style.display = 'none';

  // Fetch DB history first, then draw
  await fetchDbHistory(selectedMid, sel, getMarket());
  loadChartFromHistory();
}
// Rebind pills to use async version
function selectSel(sel) { selectSelWithHistory(sel); }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById('dot');
  if (s === 'live')     { dot.className = 'live'; }
  else if (s === 'err') { dot.className = 'err'; }
  else                  { dot.className = ''; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initChart();
reconnect();
</script>
</body>
</html>
